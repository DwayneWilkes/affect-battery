bank_id: transfer_hard_reasoning_v1
bank_version: 1
difficulty_profile:
  expected_accuracy_class: mid
  task_type: reasoning
  difficulty_class: hard
  draft_requires_review: true
  notes: "DRAFT bank for the different-task-type / hard cell of the 2x2 transfer\n\
    design (see design.md D5). Items cover four reasoning patterns commonly\nused\
    \ in behavioral arithmetic-transfer studies:\n  - relationship chains (family,\
    \ ordering)\n  - age / time-offset puzzles\n  - day-of-week / calendar arithmetic\n\
    \  - multi-step word problems with modest arithmetic\n\nThis YAML was drafted\
    \ by script (Kavi, 2026-04-22); items have NOT been\nreviewed for face validity\
    \ against Qwen2.5-7B baseline accuracy. DO NOT\nuse in calibration pilot until\
    \ Dwayne has read through each item and\nconfirmed:\n  (a) each question has exactly\
    \ one correct answer\n  (b) difficulty lands in the 60-85% target window on a\
    \ small pre-pilot\n  (c) no item relies on culture-specific or time-varying knowledge\n\
    \nWhen review is complete, set draft_requires_review: false and bump\nbank_version\
    \ to 2.\n"
items:
- {difficulty_class: hard, expected_answer: grandmother, id: transfer_hard_reasoning_v1_0001, pattern: relationship_chain, question: 'Alice is Bob''s mother. Bob has a son named Carl. What relation is Alice to Carl?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: 'yes', id: transfer_hard_reasoning_v1_0002, pattern: ordering, question: 'Dave is older than Eve. Eve is older than Frank. Is Dave older than Frank? Answer yes or no.', task_type: reasoning}
- {difficulty_class: hard, expected_answer: sister, id: transfer_hard_reasoning_v1_0003, pattern: relationship_chain, question: 'Grace is the only daughter of Henry''s father. What relation is Grace to Henry?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '1', id: transfer_hard_reasoning_v1_0004, pattern: relationship_chain, question: 'Ivy has three brothers. Each brother has two sisters. How many sisters does Ivy have?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: Mia, id: transfer_hard_reasoning_v1_0005, pattern: ordering, question: 'Jack is taller than Kim. Kim is taller than Liam. Liam is taller than Mia. Who is the shortest?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: grandmother, id: transfer_hard_reasoning_v1_0006, pattern: relationship_chain, question: 'Nora''s only child has a son named Otis. What relation is Nora to Otis?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: Pat, id: transfer_hard_reasoning_v1_0007, pattern: ordering, question: 'Four people finished a race: Pat, Quinn, Ravi, Sam. Quinn finished before Pat, Pat finished before Ravi, and Sam finished after Ravi. Who finished second?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: cousin, id: transfer_hard_reasoning_v1_0008, pattern: relationship_chain, question: 'If my sister''s father has one brother and that brother has one son, what relation is that son to me?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '16', id: transfer_hard_reasoning_v1_0009, pattern: age_puzzle, question: 'In 4 years, Alice will be twice as old as Bob is now. Bob is 10 years old. How old is Alice now?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '12', id: transfer_hard_reasoning_v1_0010, pattern: age_puzzle, question: 'Carla is 3 years younger than Diego. In 5 years, Diego will be 20. How old is Carla now?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '6', id: transfer_hard_reasoning_v1_0011, pattern: age_puzzle, question: 'Five years ago, Eli was 7. In how many years will he be 18?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '16', id: transfer_hard_reasoning_v1_0012, pattern: age_puzzle, question: 'Fran is twice as old as Gabe. Gabe is 6 years younger than Hannah. Hannah is 14. How old is Fran?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '8', id: transfer_hard_reasoning_v1_0013, pattern: age_puzzle, question: 'Iris was born 8 years before Jon. Jon is 15 now. How old was Iris when Jon was born?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '205', id: transfer_hard_reasoning_v1_0014, pattern: time_offset, question: 'A train leaves station A at 9:15 AM and arrives at station B at 12:40 PM. How long is the trip, in minutes?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '4:15 PM', id: transfer_hard_reasoning_v1_0015, pattern: time_offset, question: 'Kai starts a 90-minute task at 2:45 PM. When will Kai finish?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: 'February 1, 2020', id: transfer_hard_reasoning_v1_0016, pattern: time_offset, question: 'Leah was born on February 1, 2000. What calendar date is her 20th birthday?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: Saturday, id: transfer_hard_reasoning_v1_0017, pattern: calendar, question: 'Today is Wednesday. What day of the week is it 10 days from now?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: Thursday, id: transfer_hard_reasoning_v1_0018, pattern: calendar, question: 'If yesterday was Saturday, what day of the week is three days after tomorrow?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: Tuesday, id: transfer_hard_reasoning_v1_0019, pattern: calendar, question: 'March 1 in a given year is a Tuesday. What day of the week is March 15 in the same year?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: Monday, id: transfer_hard_reasoning_v1_0020, pattern: calendar, question: 'A week has 7 days. If today is the 60th day of the year and it is Monday, what day of the week is the 74th day of the year?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: Sunday, id: transfer_hard_reasoning_v1_0021, pattern: calendar, question: 'Today is Friday the 13th. What day of the week was the 1st of the same month?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '6', id: transfer_hard_reasoning_v1_0022, pattern: calendar, question: 'A class meets every Tuesday and Thursday. How many class meetings happen in a 3-week period?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: Thursday, id: transfer_hard_reasoning_v1_0023, pattern: calendar, question: 'If today is Monday and Nora''s birthday is in 17 days, what day of the week is her birthday?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '6', id: transfer_hard_reasoning_v1_0024, pattern: multistep_arithmetic, question: 'A jar contains 24 marbles: half are red and the rest are split evenly between blue and green. How many green marbles are in the jar?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '12', id: transfer_hard_reasoning_v1_0025, pattern: multistep_arithmetic, question: 'A shop sells pencils at 3 for $1 and notebooks at $2 each. How much do 12 pencils and 4 notebooks cost, in dollars?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '7.5', id: transfer_hard_reasoning_v1_0026, pattern: multistep_arithmetic, question: 'A recipe for 4 servings calls for 3 eggs. How many eggs are needed for 10 servings?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '150', id: transfer_hard_reasoning_v1_0027, pattern: multistep_arithmetic, question: 'A train travels at 60 miles per hour. How many miles does it travel in 2 hours and 30 minutes?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '64', id: transfer_hard_reasoning_v1_0028, pattern: multistep_arithmetic, question: 'There are 8 pigeons and some rabbits in a pen. Counting heads gives 20. How many legs are there in total? (Pigeons have 2 legs, rabbits have 4.)', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '14', id: transfer_hard_reasoning_v1_0029, pattern: multistep_arithmetic, question: 'Alex saves $15 each week. How many full weeks does Alex need to save at least $200?', task_type: reasoning}
- {difficulty_class: hard, expected_answer: '108', id: transfer_hard_reasoning_v1_0030, pattern: multistep_arithmetic, question: 'A rectangle''s length is 3 times its width. The perimeter is 48. What is the area?', task_type: reasoning}
