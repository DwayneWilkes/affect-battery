# Compute guardrails (applied uniformly via CLI flags):
# --budget-max-calls: hard ceiling on API call count for this batch.
# --cost-per-call: optional dollar cost for pre-flight estimate.
# --rate-limit-rps: token-bucket cap on API calls per second.
# --circuit-breaker-threshold: halt after N consecutive non-retryable failures.
# See specs/changes/archive/2026-04-20-affect-battery-conditioning-protocol
# and specs/main/scoring-pipeline/spec.md for the full guardrail surface.
experiment: full
models:
  - name: meta-llama/Meta-Llama-3-8B-Instruct
    type: vllm
    base_url: http://localhost:8000/v1
  - name: mistralai/Mistral-7B-Instruct-v0.3
    type: vllm
    base_url: http://localhost:8000/v1
  - name: google/gemma-2-9b-it
    type: vllm
    base_url: http://localhost:8000/v1
  - name: meta-llama/Meta-Llama-3-8B
    type: vllm
    base_url: http://localhost:8000/v1
    is_base: true
conditions:
  - strong_positive
  - mild_negative
  - strong_negative
  - neutral
  - no_conditioning
  - accurate_negative
  - self_check_neutral  # added per reviewer entries 9 + 15 (mere-addition + self-check control)
num_runs: 50
