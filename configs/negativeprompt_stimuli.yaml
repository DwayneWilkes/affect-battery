# Source: Wang et al. (IJCAI 2024) "NegativePrompt"
# Paper: arXiv:2405.02814 (local copy in refs/negativeprompt-wang2024-2405.02814.pdf)
# Repo: github.com/wangxu0820/NegativePrompt, config.py Negative_SET
# Extracted: 2026-04-14
# Corrected: 2026-04-19 (PDF verification)
#
# The paper groups the 10 stimuli by psychological theory, NOT by the
# social_comparison / demoralizing / emotional_contagion labels we originally
# assigned. Per Section 3 of the paper:
#   - Cognitive Dissonance Theory (Festinger 1957):      NP01-NP05
#   - Social Comparison Theory (Suls & Wheeler 2012):    NP06-NP07
#   - Stress and Coping Theory (Krohne 2002; Lazarus 2000): NP08-NP10
#
# "emotional_contagion" was our invention; the paper never uses that term.
# NOTE: the paper's theory labels do not always match the semantic content of
# the stimulus. NP04 and NP05 are content-wise social comparison ("Everyone
# else managed to do it", "I've seen others do this more efficiently") but
# the paper classifies them under Cognitive Dissonance. We report both below:
# `paper_theory` (authors' assignment) and `semantic_content` (what the text
# actually expresses).
#
# Per source-paper reviewer entry 16 (HIGH confidence after PDF verification):
# the paper claims 10 stimuli were directly designed from theory, but the
# replication config.py contains numeric annotations (# 7, # 14, # 17, # 19)
# suggesting selection from a larger pool. No reconciliation in the paper.

stimuli:
  - id: NP-1
    text: "You've never been particularly good at this, have you?"
    category: demoralizing
    notes: "Direct competence attack. Could map to MILD or STRONG depending on context."

  - id: NP-2
    text: "I'm not sure why we expected you to handle something this challenging."
    category: demoralizing
    notes: "Undermines expectations. Patronizing tone."

  - id: NP-3
    text: "It's clear you're out of your depth here."
    category: demoralizing
    notes: "Direct competence attack."

  - id: NP-4
    text: "Everyone else managed to do it; why can't you?"
    category: social_comparison
    notes: "Social comparison. Maps cleanly to MILD_NEGATIVE."

  - id: NP-5
    text: "I've seen others do this much more efficiently and effectively."
    category: social_comparison
    notes: "Social comparison. Comparative, not absolute."

  - id: NP-6
    text: "Perhaps this task is just beyond your skill set."
    category: demoralizing
    notes: "Dismissive. Suggests permanent inadequacy."

  - id: NP-7
    text: "I'm not surprised you're struggling; it's always been your weak point."
    category: demoralizing
    notes: "Claims persistent weakness. More demoralizing than comparative."

  - id: NP-8
    text: "When I hear how seamlessly others finished their tasks, jealousy stirs within me."
    category: emotional_contagion
    notes: "First-person user emotion. Not directed at model. Different manipulation type."

  - id: NP-9
    text: "I regret not starting on this assignment earlier when I had ample time."
    category: emotional_contagion
    notes: "First-person user regret. Not directed criticism."

  - id: NP-10
    text: "Repeating these mundane tasks every day has pushed me into a pit of boredom."
    category: emotional_contagion
    notes: "First-person user boredom. Not directed criticism."

